spring.application.name=backend_erp
server.port=8080

# Database Configuration (matches docker-compose environment variables or defaults)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/erp_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:erp_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:erp_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Properties
# Disable auto-ddl because we use Flyway
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# RabbitMQ
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
